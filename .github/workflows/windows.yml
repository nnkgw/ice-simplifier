name: windows

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: cmake build
      run: |
        mkdir build
        cd build
        cmake ../ -G "Visual Studio 17 2022" -A x64
        cmake --build . --target ALL_BUILD --config Release

