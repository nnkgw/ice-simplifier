name: macos

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: macos-13

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: cmake build
      run: |
        mkdir build
        cd build
        cmake ../ -DCMAKE_BUILD_TYPE=Release
        cmake --build .

